name: Selenium Pytest Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Install Chrome browser
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # Step 5: Run Selenium tests
      - name: Run Tests
        run: |
          pytest SampleFramework/test/test_e2etest.py -v -s \
            --html=SampleFramework/reports/report.html \
            --self-contained-html

      # Step 6: Upload HTML report as artifact
      - name: Upload Test Report
        uses: actions/upload-artifact@v3
        if: always()   # upload even if tests fail
        with:
          name: test-report
          path: SampleFramework/reports/report.html